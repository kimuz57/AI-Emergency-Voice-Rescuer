services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: smartvoice-mosquitto
    ports:
      - "1883:1883"   # สำหรับ MQTT (TCP)
      - "9001:9001"   # สำหรับ WS (WebSocket)
      - "8084:8084"   # สำหรับ WSS (WebSocket Secure)
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
      - ./mosquitto/certs:/mosquitto/certs  # 🟢 เพิ่มบรรทัดนี้เพื่อจำลองแฟ้มเก็บ SSL
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: smartvoice-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: godb
    ports:
      - "5433:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    restart: unless-stopped