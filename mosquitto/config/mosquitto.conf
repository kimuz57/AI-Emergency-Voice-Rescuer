# ==========================================
# 1. MQTT ธรรมดา (TCP) -> สำหรับ Python Backend
# ==========================================
listener 1883 0.0.0.0
allow_anonymous true

# ==========================================
# 2. WebSocket (WS) -> สำหรับ ESP32
# ==========================================
listener 9001
protocol websockets
allow_anonymous true  # 🟢 เพิ่มบรรทัดนี้ เพื่อให้ ESP32 เข้าได้โดยไม่ต้องใส่รหัสผ่าน

# ==========================================
# 3. การตั้งค่าระบบจัดการข้อมูลและ Log (จากของเดิมของคุณ)
# ==========================================
persistence true
persistence_location /mosquitto/data/

log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type all